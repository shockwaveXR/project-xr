<!DOCTYPE html>
<html>
  <head>
    <script>
      const path = window.location.pathname;
      const repo = '/pokedex';
      if (path.startsWith(repo)) {
        sessionStorage.setItem('redirect', path);
      }
      window.location.replace('https://shockwavexr.github.io/pokedex/');
    </script>
  </head>
  <body></body>
</html>
