<!DOCTYPE html>
<html>
  <head>
    <script>
      // GitHub Pages project-page SPA fallback: served for any unknown path
      // (deep links / hard refreshes on client-side routes). save the full
      // target so index.html can replay it once the SPA boots, then bounce to
      // the app root at /project-xr/.
      var loc = window.location;
      if (loc.pathname !== '/project-xr/') {
        sessionStorage.setItem('redirect', loc.pathname + loc.search + loc.hash);
      }
      loc.replace('/project-xr/');
    </script>
  </head>
  <body></body>
</html>
